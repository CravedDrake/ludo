<!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludo — Waiting Room</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet"
    />

    <link rel="stylesheet" href="room.css" />
    </head>

    <body>

    <div class="bg-grid" aria-hidden="true"></div>

    <!-- ╔════════ WAITING ROOM UI ════════╗ -->
    <main class="page">

    <!-- HEADER -->
    <header class="hero">
        <div class="ludo-token" aria-hidden="true">
        <div class="ludo-token__body">
            <div class="ludo-token__dome"></div>
        </div>
        </div>
        <h1 class="hero__title">LUDO</h1>
        <p class="hero__subtitle">Waiting Room</p>
    </header>

    <!-- ROOM INFO -->
    <section class="card" aria-label="Room information">
        <h2 class="card__heading">Room Code</h2>
        <div class="room-code-row">
        <span class="room-code" id="room-code">……</span>
        <button class="btn-copy" id="copy-room-btn" type="button">Copy</button>
        </div>
        <div class="divider"></div>
        <div class="game-status-row">
        <span class="game-status__label">Game Status</span>
        <span class="game-status__value" id="game-status">Waiting for players…</span>
        </div>
    </section>

    <!-- JOIN CARD -->
    <section class="card" id="join-card">
        <h2 class="card__heading">Join Room</h2>
        <div class="field">
        <input
            type="text"
            id="join-name"
            class="field__input"
            placeholder="Enter your name"
            maxlength="20"
            autocomplete="off"
        />
        </div>
        <button id="join-btn" class="btn-create" type="button">Join Game</button>
    </section>

    <!-- PLAYERS -->
    <section class="card">
        <h2 class="card__heading">Players</h2>
        <ul class="player-list">
        <li class="player-slot player-slot--empty" id="player1-slot">
            <div class="player-slot__color player-slot__color--red"></div>
            <div class="player-slot__info">
            <span id="player1-name">Waiting…</span>
            <span id="player1-status">Empty</span>
            </div>
            <span class="badge badge--host">Host</span>
        </li>
        <li class="player-slot player-slot--empty" id="player2-slot">
            <div class="player-slot__color player-slot__color--blue"></div>
            <div class="player-slot__info">
            <span id="player2-name">Waiting…</span>
            <span id="player2-status">Empty</span>
            </div>
        </li>
        <li class="player-slot player-slot--empty" id="player3-slot">
            <div class="player-slot__color player-slot__color--green"></div>
            <div class="player-slot__info">
            <span id="player3-name">Waiting…</span>
            <span id="player3-status">Empty</span>
            </div>
        </li>
        <li class="player-slot player-slot--empty" id="player4-slot">
            <div class="player-slot__color player-slot__color--yellow"></div>
            <div class="player-slot__info">
            <span id="player4-name">Waiting…</span>
            <span id="player4-status">Empty</span>
            </div>
        </li>
        </ul>
    </section>

    <!-- ACTIONS -->
    <div class="action-row">
        <button class="btn-leave" id="leave-room-btn" type="button">Leave Room</button>
        <button
        class="btn-start btn-start--disabled"
        id="start-game-btn"
        aria-disabled="true"
        type="button"
        >🎲 Start Game</button>
    </div>

    <p class="waiting-message" id="waiting-message">Waiting for more players…</p>

    </main>

    <!-- ╔════════ GAME UI ════════╗ -->
    <div id="game-container" style="display:none;">

    <div class="game-header">
        <div id="turn-indicator"></div>

        <!-- PLAYER LEGEND — color swatch beside each player's name -->
        <div class="player-legend" id="player-legend">
        <div class="legend-item legend-item--empty" id="legend-player1" data-slot="player1">
            <span class="legend-color legend-color--red"></span>
            <span class="legend-name" id="legend-player1-name">Red</span>
        </div>
        <div class="legend-item legend-item--empty" id="legend-player2" data-slot="player2">
            <span class="legend-color legend-color--blue"></span>
            <span class="legend-name" id="legend-player2-name">Blue</span>
        </div>
        <div class="legend-item legend-item--empty" id="legend-player3" data-slot="player3">
            <span class="legend-color legend-color--green"></span>
            <span class="legend-name" id="legend-player3-name">Green</span>
        </div>
        <div class="legend-item legend-item--empty" id="legend-player4" data-slot="player4">
            <span class="legend-color legend-color--yellow"></span>
            <span class="legend-name" id="legend-player4-name">Yellow</span>
        </div>
        </div>

        <div class="dice-row">
        <button id="roll-dice-btn" type="button">🎲 Roll Dice</button>
        <div id="dice-value">–</div>
        </div>
    </div>

    <!--
        LUDO BOARD — 15×15 grid
        Layout key:
        Columns 0–5   = left block
        Column  6     = vertical corridor
        Columns 7–8   = center columns  (shared with horizontal corridor)
        Column  9–14  = right block

        Rows 0–5   = top block
        Row  6     = horizontal corridor
        Rows 7–8   = center rows        (shared with vertical corridor)
        Row  9–14  = bottom block

        Corner zones (6×6 squares):
        Red    = rows 0–5,  cols 0–5
        Blue   = rows 0–5,  cols 9–14
        Green  = rows 9–14, cols 0–5
        Yellow = rows 9–14, cols 9–14

        Home stretch (6 cells leading to center):
        Red    runs right along row 7,   cols 1–6
        Blue   runs down  along col 7,   rows 1–6
        Green  runs up    along col 7,   rows 8–13
        Yellow runs left  along row 7,   cols 8–13

        Center square = rows 6–8, cols 6–8 (3×3 finishing zone)

        Track path cell IDs = "c-ROW-COL"
    -->

    <div id="ludo-board">

        <!-- ── ROW 0 ── -->
        <!-- Red home zone rows 0-5, cols 0-5 -->
        <div class="b-cell zone-red"    id="c-0-0"></div>
        <div class="b-cell zone-red"    id="c-0-1"></div>
        <div class="b-cell zone-red"    id="c-0-2"></div>
        <div class="b-cell zone-red"    id="c-0-3"></div>
        <div class="b-cell zone-red"    id="c-0-4"></div>
        <div class="b-cell zone-red"    id="c-0-5"></div>
        <!-- track col 6 -->
        <div class="b-cell track"       id="c-0-6"></div>
        <!-- blue home cols 7-8 blank fillers for row 0 become track -->
        <div class="b-cell track" id="c-0-7"></div>
        <div class="b-cell track"       id="c-0-8"></div>
        <!-- Blue home zone rows 0-5, cols 9-14 -->
        <div class="b-cell zone-blue"   id="c-0-9"></div>
        <div class="b-cell zone-blue"   id="c-0-10"></div>
        <div class="b-cell zone-blue"   id="c-0-11"></div>
        <div class="b-cell zone-blue"   id="c-0-12"></div>
        <div class="b-cell zone-blue"   id="c-0-13"></div>
        <div class="b-cell zone-blue"   id="c-0-14"></div>

        <!-- ── ROW 1 ── -->
        <div class="b-cell zone-red"    id="c-1-0"></div>
        <div class="b-cell home-inner red-inner" id="c-1-1"></div>
        <div class="b-cell home-inner red-inner" id="c-1-2"></div>
        <div class="b-cell home-inner red-inner" id="c-1-3"></div>
        <div class="b-cell home-inner red-inner" id="c-1-4"></div>
        <div class="b-cell zone-red"    id="c-1-5"></div>
        <div class="b-cell track"       id="c-1-6"></div>
        <div class="b-cell home-stretch stretch-blue" id="c-1-7"></div>
        <div class="b-cell track safe-blue" id="c-1-8"></div>
        <div class="b-cell zone-blue"   id="c-1-9"></div>
        <div class="b-cell home-inner blue-inner" id="c-1-10"></div>
        <div class="b-cell home-inner blue-inner" id="c-1-11"></div>
        <div class="b-cell home-inner blue-inner" id="c-1-12"></div>
        <div class="b-cell home-inner blue-inner" id="c-1-13"></div>
        <div class="b-cell zone-blue"   id="c-1-14"></div>

        <div class="b-cell zone-yellow"  id="c-14-14"></div>

        <!-- HOME CIRCLES inside corner zones -->
        <div class="home-circle hc-red"    id="hc-red"></div>
        <div class="home-circle hc-blue"   id="hc-blue"></div>
        <div class="home-circle hc-green"  id="hc-green"></div>
        <div class="home-circle hc-yellow" id="hc-yellow"></div>

        <!-- PLAYER NAME LABELS — sit on the outer edge of each corner zone,
             beside/above that color's home circle, showing who is playing
             that color. Filled in by updateHomeLabels() in room.js. -->
        <div class="home-name-label label-red"    id="home-name-red"></div>
        <div class="home-name-label label-blue"   id="home-name-blue"></div>
        <div class="home-name-label label-green"  id="home-name-green"></div>
        <div class="home-name-label label-yellow" id="home-name-yellow"></div>

        <!-- TOKEN SLOTS inside home circles (absolute positioned by JS) -->
        <!-- Red tokens -->
        <div class="token red" id="player1-t1"></div>
        <div class="token red" id="player1-t2"></div>
        <div class="token red" id="player1-t3"></div>
        <div class="token red" id="player1-t4"></div>
        <!-- Blue tokens -->
        <div class="token blue" id="player2-t1"></div>
        <div class="token blue" id="player2-t2"></div>
        <div class="token blue" id="player2-t3"></div>
        <div class="token blue" id="player2-t4"></div>
        <!-- Green tokens -->
        <div class="token green" id="player3-t1"></div>
        <div class="token green" id="player3-t2"></div>
        <div class="token green" id="player3-t3"></div>
        <div class="token green" id="player3-t4"></div>
        <!-- Yellow tokens -->
        <div class="token yellow" id="player4-t1"></div>
        <div class="token yellow" id="player4-t2"></div>
        <div class="token yellow" id="player4-t3"></div>
        <div class="token yellow" id="player4-t4"></div>

    </div><!-- #ludo-board -->

    </div><!-- #game-container -->

    <!-- ╔════════ RESULT / RANKING POPUP ════════╗
         Hidden by default; shown/filled in by room.js whenever a
         player finishes all 4 tokens. -->
    <div class="modal-overlay" id="result-modal" style="display:none;">
        <div class="modal-card">
            <div class="modal-icon" id="modal-icon">🏆</div>
            <h2 class="modal-title" id="modal-title">Player Won!</h2>
            <div class="modal-ranking" id="modal-ranking"></div>
            <button class="btn-modal-continue" id="modal-continue-btn" type="button">Continue Game</button>
            <button class="btn-modal-leave" id="modal-leave-btn" type="button">Leave Game</button>
        </div>
    </div>

    <script type="module" src="room.js"></script>

    </body>
    </html>
