<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ludo — Waiting Room</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
    href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet"
/>

<link rel="stylesheet" href="room.css" />
</head>

<body>

<div class="bg-grid" aria-hidden="true"></div>

<!-- ╔════════ WAITING ROOM UI ════════╗ -->
<main class="page">

<!-- HEADER -->
<header class="hero">
    <div class="ludo-token" aria-hidden="true">
    <div class="ludo-token__body">
        <div class="ludo-token__dome"></div>
    </div>
    </div>
    <h1 class="hero__title">LUDO</h1>
    <p class="hero__subtitle">Waiting Room</p>
</header>

<!-- ROOM INFO -->
<section class="card" aria-label="Room information">
    <h2 class="card__heading">Room Code</h2>
<div class="room-code-row">
  <div class="room-code" id="room-code"></div>
</div>
<div class="copy-btn-group">
  <button class="btn-copy" id="copy-link-btn">Copy Link</button>
  <button class="btn-copy" id="copy-code-btn">Copy Code</button>
</div>
    <div class="divider"></div>
    <div class="game-status-row">
    <span class="game-status__label">Game Status</span>
    <span class="game-status__value" id="game-status">Waiting for players…</span>
    </div>
</section>

<!-- JOIN CARD -->
<section class="card" id="join-card">
    <h2 class="card__heading">Join Room</h2>
    <div class="field">
    <input
        type="text"
        id="join-name"
        class="field__input"
        placeholder="Enter your name"
        maxlength="20"
        autocomplete="off"
    />
    </div>
    <button id="join-btn" class="btn-create" type="button">Join Game</button>
</section>

<!-- PLAYERS -->
<section class="card">
    <h2 class="card__heading">Players</h2>
    <ul class="player-list">
    <li class="player-slot player-slot--empty" id="player1-slot">
        <div class="player-slot__color player-slot__color--red"></div>
        <div class="player-slot__info">
        <span id="player1-name">Waiting…</span>
        <span id="player1-status">Empty</span>
        </div>
        <span class="badge badge--host">Host</span>
    </li>
    <li class="player-slot player-slot--empty" id="player2-slot">
        <div class="player-slot__color player-slot__color--blue"></div>
        <div class="player-slot__info">
        <span id="player2-name">Waiting…</span>
        <span id="player2-status">Empty</span>
        </div>
    </li>
    <li class="player-slot player-slot--empty" id="player3-slot">
        <div class="player-slot__color player-slot__color--green"></div>
        <div class="player-slot__info">
        <span id="player3-name">Waiting…</span>
        <span id="player3-status">Empty</span>
        </div>
    </li>
    <li class="player-slot player-slot--empty" id="player4-slot">
        <div class="player-slot__color player-slot__color--yellow"></div>
        <div class="player-slot__info">
        <span id="player4-name">Waiting…</span>
        <span id="player4-status">Empty</span>
        </div>
    </li>
    </ul>
</section>

<!-- ACTIONS -->
<div class="action-row">
    <button class="btn-leave" id="leave-room-btn" type="button">Leave Room</button>
    <button
    class="btn-start btn-start--disabled"
    id="start-game-btn"
    aria-disabled="true"
    type="button"
    >🎲 Start Game</button>
</div>

<p class="waiting-message" id="waiting-message">Waiting for more players…</p>

</main>

<!-- ╔════════ GAME UI ════════╗ -->
<div id="game-container" style="display:none;">

<div class="game-header">
    <div id="turn-indicator"></div>

    <!-- PLAYER LEGEND — color swatch beside each player's name -->
    <div class="player-legend" id="player-legend">
    <div class="legend-item legend-item--empty" id="legend-player1" data-slot="player1">
        <span class="legend-color legend-color--red"></span>
        <span class="legend-name" id="legend-player1-name">Red</span>
    </div>
    <div class="legend-item legend-item--empty" id="legend-player2" data-slot="player2">
        <span class="legend-color legend-color--blue"></span>
        <span class="legend-name" id="legend-player2-name">Blue</span>
    </div>
    <div class="legend-item legend-item--empty" id="legend-player3" data-slot="player3">
        <span class="legend-color legend-color--green"></span>
        <span class="legend-name" id="legend-player3-name">Green</span>
    </div>
    <div class="legend-item legend-item--empty" id="legend-player4" data-slot="player4">
        <span class="legend-color legend-color--yellow"></span>
        <span class="legend-name" id="legend-player4-name">Yellow</span>
    </div>
    </div>
</div>

<!--
    BOARD WRAP — wraps the board plus 4 per-color dice boxes.
    Each dice box is positioned absolutely so it looks like a small
    tab/extension sticking out of the board, right above/below that
    color's own home corner. Red/Blue sit above the board (their
    corners are the top two), Green/Yellow sit below (their corners
    are the bottom two). Red & Green (left corners) sit on the left,
    Blue & Yellow (right corners) sit on the right. Clicking a dice
    box rolls for that color — but only the local player's own color
    is actually clickable (enforced in room.js).

    Each dice box also carries a small "dice-timer" badge (the 45s
    per-turn countdown clock) tucked into its corner so it reads as
    part of the same tab rather than a separate element.

    UPDATED: dice faces are now a real CSS 3D cube (.die-scene /
    .die-cube / 6x .die-face, each face laid out with a 3x3 pip grid)
    instead of a flat unicode glyph. No images/textures — pure CSS
    3D transforms + CSS Grid, driven entirely by room.js (see the
    "3D DICE — ROTATION ENGINE" section there for the rotation math).
-->
<div class="board-wrap" id="board-wrap">

    <div class="dice-box dice-box--red" id="dice-box-player1" aria-label="Red dice">
        <div class="die-scene">
            <div class="die-cube" id="dice-cube-player1">
                <div class="die-face die-face--1"><span class="die-pip die-p-e"></span></div>
                <div class="die-face die-face--2"><span class="die-pip die-p-a"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--3"><span class="die-pip die-p-a"></span><span class="die-pip die-p-e"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--4"><span class="die-pip die-p-a"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--5"><span class="die-pip die-p-a"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-e"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--6"><span class="die-pip die-p-a"></span><span class="die-pip die-p-d"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-f"></span><span class="die-pip die-p-i"></span></div>
            </div>
        </div>
        <div class="dice-timer" id="dice-timer-player1">45</div>
    </div>

    <div class="dice-box dice-box--blue" id="dice-box-player2" aria-label="Blue dice">
        <div class="die-scene">
            <div class="die-cube" id="dice-cube-player2">
                <div class="die-face die-face--1"><span class="die-pip die-p-e"></span></div>
                <div class="die-face die-face--2"><span class="die-pip die-p-a"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--3"><span class="die-pip die-p-a"></span><span class="die-pip die-p-e"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--4"><span class="die-pip die-p-a"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--5"><span class="die-pip die-p-a"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-e"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--6"><span class="die-pip die-p-a"></span><span class="die-pip die-p-d"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-f"></span><span class="die-pip die-p-i"></span></div>
            </div>
        </div>
        <div class="dice-timer" id="dice-timer-player2">45</div>
    </div>

    <div class="dice-box dice-box--green" id="dice-box-player3" aria-label="Green dice">
        <div class="die-scene">
            <div class="die-cube" id="dice-cube-player3">
                <div class="die-face die-face--1"><span class="die-pip die-p-e"></span></div>
                <div class="die-face die-face--2"><span class="die-pip die-p-a"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--3"><span class="die-pip die-p-a"></span><span class="die-pip die-p-e"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--4"><span class="die-pip die-p-a"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--5"><span class="die-pip die-p-a"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-e"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--6"><span class="die-pip die-p-a"></span><span class="die-pip die-p-d"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-f"></span><span class="die-pip die-p-i"></span></div>

        </div>

                <div class="die-face die-face--5"><span class="die-pip die-p-a"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-e"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-i"></span></div>
                <div class="die-face die-face--6"><span class="die-pip die-p-a"></span><span class="die-pip die-p-d"></span><span class="die-pip die-p-g"></span><span class="die-pip die-p-c"></span><span class="die-pip die-p-f"></span><span class="die-pip die-p-i"></span></div>
            </div>
        </div>
        <div class="dice-timer" id="dice-timer-player4">45</div>
    </div>

    <!--
        LUDO BOARD — 15×15 grid
        Layout key:
        Columns 0–5   = left block
        Column  6     = vertical corridor
        Columns 7–8   = center columns  (shared with horizontal corridor)
        Column  9–14  = right block

        Rows 0–5   = top block
        Row  6     = horizontal corridor
        Rows 7–8   = center rows        (shared with vertical corridor)
        Row  9–14  = bottom block

        Corner zones (6×6 squares):
        Red    = rows 0–5,  cols 0–5
        Blue   = rows 0–5,  cols 9–14
        Green  = rows 9–14, cols 0–5
        Yellow = rows 9–14, cols 9–14

        Home stretch (6 cells leading to center):
        Red    runs right along row 7,   cols 1–6
        Blue   runs down  along col 7,   rows 1–6
        Green  runs up    along col 7,   rows 8–13
        Yellow runs left  along row 7,   cols 8–13

        Center square = rows 6–8, cols 6–8 (3×3 finishing zone)

        Track path cell IDs = "c-ROW-COL"
    -->

    <div id="ludo-board">

        <!-- ── ROW 0 ── -->
        <!-- Red home zone rows 0-5, cols 0-5 -->
        <div class="b-cell zone-red"    id="c-0-0"></div>
        <div class="b-cell zone-red"    id="c-0-1"></div>
        <div class="b-cell zone-red"    id="c-0-2"></div>
        <div class="b-cell zone-red"    id="c-0-3"></div>
        <div class="b-cell zone-red"    id="c-0-4"></div>
        <div class="b-cell zone-red"    id="c-0-5"></div>
        <!-- track col 6 -->
        <div class="b-cell track"       id="c-0-6"></div>
        <!-- blue home cols 7-8 blank fillers for row 0 become track -->
        <div class="b-cell track" id="c-0-7"></div>
        <div class="b-cell track"       id="c-0-8"></div>
        <!-- Blue home zone rows 0-5, cols 9-14 -->
        <div class="b-cell zone-blue"   id="c-0-9"></div>
        <div class="b-cell zone-blue"   id="c-0-10"></div>
        <div class="b-cell zone-blue"   id="c-0-11"></div>
        <div class="b-cell zone-blue"   id="c-0-12"></div>
        <div class="b-cell zone-blue"   id="c-0-13"></div>
        <div class="b-cell zone-blue"   id="c-0-14"></div>

        <!-- ── ROW 1 ── -->
        <div class="b-cell zone-red"    id="c-1-0"></div>
        <div class="b-cell home-inner red-inner" id="c-1-1"></div>
        <div class="b-cell home-inner red-inner" id="c-1-2"></div>

        <div class="b-cell home-inner red-inner" id="c-1-4"></div>
        <div class="b-cell zone-red"    id="c-1-5"></div>
        <div class="b-cell track"       id="c-1-6"></div>
        <div class="b-cell home-stretch stretch-blue" id="c-1-7"></div>
        <div class="b-cell track safe-blue" id="c-1-8"></div>
        <div class="b-cell zone-blue"   id="c-1-9"></div>
        <div class="b-cell home-inner blue-inner" id="c-1-10"></div>

        <div class="b-cell zone-blue"   id="c-3-14"></div>

        <div class="b-cell home-inner red-inner" id="c-4-3"></div>
        <div class="b-cell home-inner red-inner" id="c-4-4"></div>
        <div class="b-cell zone-red"    id="c-4-5"></div>
        <div class="b-cell track"       id="c-4-6"></div>
        <div class="b-cell home-stretch stretch-blue" id="c-4-7"></div>
        <div class="b-cell track"       id="c-4-8"></div>

        <div class="b-cell home-inner blue-inner" id="c-4-10"></div>

     Hidden by default; shown/filled in by room.js whenever a
     player finishes all 4 tokens. -->
<div class="modal-overlay" id="result-modal" style="display:none;">
    <div class="modal-card">
        <div class="modal-icon" id="modal-icon">🏆</div>
        <h2 class="modal-title" id="modal-title">Player Won!</h2>
        <div class="modal-ranking" id="modal-ranking"></div>
        <button class="btn-modal-continue" id="modal-continue-btn" type="button">Continue Game</button>
        <button class="btn-modal-leave" id="modal-leave-btn" type="button">Leave Game</button>
    </div>
</div>

<!-- ╔════════ NEW: LIVE ROOM CHAT ════════╗
     Real-time chat scoped to this room's code (rooms/ROOM_CODE/chat).
     Visible from the moment the page loads — readable in the waiting
     room, not just once the game starts. Sending a message requires
     having actually joined a seat (enforced in room.js/sendMessage()).
     All wiring — listeners, send/receive, rate limiting, validation,
     auto-scroll, unread badge — lives in room.js under the "LIVE TEXT
     CHAT SYSTEM" section. Nothing here touches the game/board markup
     above. -->

<button class="chat-toggle-btn" id="chat-toggle-btn" type="button" aria-label="Open chat">
    💬
    <span class="chat-unread-badge" id="chat-unread-badge"></span>
</button>

<div class="chat-panel" id="chat-panel">
    <div class="chat-panel__header">
        <span class="chat-panel__title">💬 Room Chat</span>
        <button class="chat-close-btn" id="chat-close-btn" type="button" aria-label="Close chat">✕</button>
    </div>

    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-input-row">
        <textarea
            id="chat-input"
            class="chat-input"
            placeholder="Type a message…"
            maxlength="200"
            rows="1"
        ></textarea>
        <button class="chat-send-btn" id="chat-send-btn" type="button" aria-label="Send message">➤</button>
    </div>
    <div class="chat-char-counter" id="chat-char-counter">0/200</div>
</div>

<script type="module" src="room.js"></script>
